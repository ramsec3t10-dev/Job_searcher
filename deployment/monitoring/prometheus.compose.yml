# EMBEDHUNT AI — Prometheus scrape config for the docker-compose stack.
# The API service is reachable as `api:8000` on the compose network
# (deployment/monitoring/prometheus.yml is the Kubernetes variant).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "embedhunt-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: "embedhunt-api-health"
    metrics_path: /health
    scheme: http
    static_configs:
      - targets: ["api:8000"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
