name: Release — Build APK & Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      ####################################################################
      # CHECKOUT
      ####################################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ####################################################################
      # JAVA
      ####################################################################

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      ####################################################################
      # FLUTTER
      ####################################################################

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      ####################################################################
      # ANDROID SIGNING
      ####################################################################

      - name: Decode Android Keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks

      - name: Create key.properties
        shell: bash
        run: |
          printf "storePassword=%s\n" "${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
          printf "keyPassword=%s\n" "${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          printf "keyAlias=%s\n" "${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties

      ####################################################################
      # VERIFY SIGNING
      ####################################################################

      - name: Verify Signing Configuration
        shell: bash
        run: |
          echo "===== android ====="
          ls -lah android

          echo
          echo "===== key.properties ====="
          cat -A android/key.properties

          echo
          echo "===== keystore ====="
          ls -lah android/upload-keystore.jks

      ####################################################################
      # VERSION
      ####################################################################

      - name: Extract Version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          VERSION_CODE=$((MAJOR*10000 + MINOR*100 + PATCH))

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Update pubspec Version
        shell: bash
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}+${{ steps.version.outputs.version_code }}/" pubspec.yaml

      ####################################################################
      # DEPENDENCIES
      ####################################################################

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Tests
        run: flutter test

      ####################################################################
      # BUILD
      ####################################################################

      - name: Build Release APK
        shell: bash
        run: |
          flutter build apk \
            --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.version_code }}

      ####################################################################
      # PREPARE ARTIFACT
      ####################################################################

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p dist

          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/embedhunt-v${{ steps.version.outputs.version }}.apk

      - name: Verify Artifact
        shell: bash
        run: |
          echo "===== DIST ====="

          ls -lah dist

          test -f dist/embedhunt-v${{ steps.version.outputs.version }}.apk

          echo "APK verified."

      ####################################################################
      # GITHUB RELEASE
      ####################################################################

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: EMBEDHUNT AI v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            mobile/dist/embedhunt-v${{ steps.version.outputs.version }}.apk

      ####################################################################
      # VERIFY AFTER RELEASE
      ####################################################################

      - name: Verify Release Artifact
        shell: bash
        run: |
          echo "Release upload step finished."

          ls -lah dist

      ####################################################################
      # BACKEND UPDATE
      ####################################################################

      - name: Publish Version To Backend
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          UPDATE_SECRET: ${{ secrets.BACKEND_UPDATE_SECRET }}
          APK_URL: ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/embedhunt-v${{ steps.version.outputs.version }}.apk

        shell: bash
        run: |
          curl --fail \
            -X POST "$BACKEND_URL/api/v1/app/version/update" \
            -H "Content-Type: application/json" \
            -H "X-Update-Secret: $UPDATE_SECRET" \
            -d "{
              \"latest_version\":\"${{ steps.version.outputs.version }}\",
              \"version_code\":${{ steps.version.outputs.version_code}},
              \"apk_url\":\"$APK_URL\",
              \"minimum_version\":\"1.0.0\",
              \"force_update\":false,
              \"release_notes\":[\"Update to v${{ steps.version.outputs.version }}\"]
            }"