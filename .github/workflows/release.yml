name: Release — Build APK & Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Extract version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((MAJOR*10000 + MINOR*100 + PATCH))

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Update pubspec version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}+${{ steps.version.outputs.version_code }}/" pubspec.yaml

      - name: Install packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.version_code }}

      - name: Prepare release artifact
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
          dist/embedhunt-v${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: EMBEDHUNT AI v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: mobile/dist/embedhunt-v${{ steps.version.outputs.version }}.apk

      - name: Publish version to backend
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          UPDATE_SECRET: ${{ secrets.BACKEND_UPDATE_SECRET }}
          APK_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/embedhunt-v${{ steps.version.outputs.version }}.apk
        run: |
          curl --fail -X POST "$BACKEND_URL/api/v1/app/version/update" \
            -H "Content-Type: application/json" \
            -H "X-Update-Secret: $UPDATE_SECRET" \
            -d "{
              \"latest_version\":\"${{ steps.version.outputs.version }}\",
              \"version_code\":${{ steps.version.outputs.version_code }},
              \"apk_url\":\"$APK_URL\",
              \"minimum_version\":\"1.0.0\",
              \"force_update\":false,
              \"release_notes\":[\"Update to v${{ steps.version.outputs.version }}\"]
            }"