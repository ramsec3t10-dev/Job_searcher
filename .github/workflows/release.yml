name: Release — Build APK & Publish Update

# Cut a release by pushing a semver tag from your laptop:
#   git tag v1.1.0 && git push origin v1.1.0
# This builds a signed APK, attaches it to a GitHub Release, and notifies the
# backend so every running app shows the in-app update prompt.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-apk:
    name: Build & publish Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "tag=$TAG"                 >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"         >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Apply version to pubspec
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}+${{ steps.version.outputs.version_code }}/" pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      # Optional signing. If the KEYSTORE_BASE64 secret is present the APK is
      # signed with your release key; otherwise Flutter's debug signing is used
      # (fine for side-loaded distribution while you set up a keystore).
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/embedhunt-release.jks
          {
            echo "storeFile=embedhunt-release.jks"
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
          } > android/key.properties

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.version_code }}

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/embedhunt-v${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: EMBEDHUNT AI v${{ steps.version.outputs.version }}
          body: |
            ## EMBEDHUNT AI v${{ steps.version.outputs.version }}

            Installed users are prompted to update automatically inside the app.

            First-time install:
            1. Enable "Install from unknown sources" in Android settings
            2. Download the APK below and tap to install
          files: mobile/dist/embedhunt-v${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: false

      # Tell the backend a new version exists. The backend then serves it from
      # GET /api/v1/app/version, which every app polls every 30 minutes.
      - name: Publish version to backend
        if: ${{ secrets.BACKEND_URL != '' && secrets.BACKEND_UPDATE_SECRET != '' }}
        env:
          APK_URL: ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/embedhunt-v${{ steps.version.outputs.version }}.apk
        run: |
          curl --fail -X POST "${{ secrets.BACKEND_URL }}/api/v1/app/version/update" \
            -H "Content-Type: application/json" \
            -H "X-Update-Secret: ${{ secrets.BACKEND_UPDATE_SECRET }}" \
            -d "{
              \"latest_version\": \"${{ steps.version.outputs.version }}\",
              \"version_code\": ${{ steps.version.outputs.version_code }},
              \"apk_url\": \"${APK_URL}\",
              \"mandatory\": false,
              \"release_notes\": \"Update to v${{ steps.version.outputs.version }}. See GitHub for details.\",
              \"min_supported_version\": \"1.0.0\"
            }"
